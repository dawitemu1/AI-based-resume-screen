<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="dataGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="chartGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Rotating gear -->
  <g transform="translate(100,100)">
    <circle cx="0" cy="0" r="20" fill="url(#dataGradient)"/>
    <g>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(0)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(45)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(90)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(135)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(180)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(225)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(270)"/>
      <rect x="-3" y="-25" width="6" height="15" fill="#4B2E00" transform="rotate(315)"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"/>
  </g>
  
  <!-- Moving data points -->
  <circle cx="30" cy="50" r="5" fill="#A67C00">
    <animate attributeName="cy" values="50;150;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="70" cy="80" r="5" fill="#A67C00">
    <animate attributeName="cy" values="80;120;80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="70;130;70" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="120" cy="60" r="5" fill="#A67C00">
    <animate attributeName="cy" values="60;140;60" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="160" cy="90" r="5" fill="#A67C00">
    <animate attributeName="cy" values="90;110;90" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="160;40;160" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Chart bars with growing animation -->
  <rect x="40" y="160" width="15" height="0" fill="#4B0082">
    <animate attributeName="height" values="0;30;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="160;130;160" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="70" y="160" width="15" height="0" fill="#8b5cf6">
    <animate attributeName="height" values="0;40;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="160;120;160" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="100" y="160" width="15" height="0" fill="#A67C00">
    <animate attributeName="height" values="0;35;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="160;125;160" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="130" y="160" width="15" height="0" fill="#4B0082">
    <animate attributeName="height" values="0;25;0" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="160;135;160" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="160" y="160" width="15" height="0" fill="#8b5cf6">
    <animate attributeName="height" values="0;45;0" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="160;115;160" dur="2.8s" repeatCount="indefinite"/>
  </rect>
</svg>