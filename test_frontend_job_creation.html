<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Job Creation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test Job Creation</h1>
    
    <form id="jobForm">
        <div class="form-group">
            <label for="title">Job Title:</label>
            <input type="text" id="title" name="title" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="qualifications">Qualifications (separate with semicolons):</label>
            <input type="text" id="qualifications" name="qualifications" required>
        </div>
        
        <div class="form-group">
            <label for="required_skills">Required Skills (separate with commas):</label>
            <input type="text" id="required_skills" name="required_skills" required>
        </div>
        
        <div class="form-group">
            <label for="experience_required">Experience Required:</label>
            <input type="text" id="experience_required" name="experience_required" required>
        </div>
        
        <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required>
        </div>
        
        <div class="form-group">
            <label for="salary_range">Salary Range:</label>
            <input type="text" id="salary_range" name="salary_range" required>
        </div>
        
        <button type="submit">Create Job</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('jobForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Creating job...';
            
            try {
                // First login to get token
                const loginResponse = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'admin123'
                    })
                });
                
                if (!loginResponse.ok) {
                    throw new Error('Login failed');
                }
                
                const loginData = await loginResponse.json();
                const token = loginData.access_token;
                
                // Prepare form data
                const formData = new FormData();
                const form = e.target;
                
                formData.append('title', form.title.value);
                formData.append('description', form.description.value);
                formData.append('qualifications', JSON.stringify(form.qualifications.value.split(';').map(q => q.trim()).filter(q => q)));
                formData.append('required_skills', JSON.stringify(form.required_skills.value.split(',').map(s => s.trim()).filter(s => s)));
                formData.append('experience_required', form.experience_required.value);
                formData.append('location', form.location.value);
                formData.append('salary_range', form.salary_range.value);
                
                // Create job
                const jobResponse = await fetch('/api/jobs/create', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                if (!jobResponse.ok) {
                    const errorData = await jobResponse.json();
                    throw new Error(errorData.detail || 'Job creation failed');
                }
                
                const jobData = await jobResponse.json();
                resultDiv.innerHTML = `<div class="result success">Job created successfully! Job ID: ${jobData.job_id}</div>`;
                form.reset();
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
